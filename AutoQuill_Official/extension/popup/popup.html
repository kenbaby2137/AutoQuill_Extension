<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoQuill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="main-header">
      <div class="logo">
        <div class="logo-icon">AQ</div>
        <h1>AutoQuill</h1>
      </div>
      <div class="badges">
        <span class="status-badge" id="online-status">Offline</span>
        <span class="shortcut-badge">Alt+Q</span>
      </div>
    </header>

    <div class="settings-grid">
      <section class="input-section">
        <label for="profileName">Profile Name</label>
        <div class="input-row">
          <input type="text" id="profileName" placeholder="Profile name..." autocomplete="off">
          <button id="setProfile" class="btn-icon-green" title="Lock Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </button>
          <button id="editProfile" class="btn-icon-orange hidden" title="Unlock Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
          </button>
        </div>
      </section>
  
      <section class="input-section">
        <label for="persona">Persona</label>
        <select id="persona">
          <option value="">Choose your vibe...</option>
        </select>
      </section>
    </div>

    <div class="main-actions">
      <button id="getContent" class="btn-primary pulse">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Fetch Content
      </button>
    </div>

    <!-- Saved Contents Section -->
    <section class="saved-section" id="savedSection">
      <div class="section-header">
        <label>Recent Profiles <span id="savedCount" class="count-pill">0</span></label>
      </div>
      <div class="saved-row">
        <select id="savedContents">
          <option value="">Select cached...</option>
        </select>
        <div class="saved-actions">
          <button id="loadSaved" class="btn-action-grey" title="Load Cached">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </button>
          <button id="deleteSaved" class="btn-action-red" title="Clear Cache">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </div>
      </div>
    </section>

    <section class="preview-section hidden" id="previewSection">
      <div class="section-header">
        <label>Content Preview</label>
        <div class="pagination">
          <span id="blockCurrent">1</span> / <span id="blockTotal">1</span>
        </div>
      </div>
      <div class="textarea-wrapper">
        <textarea id="contentPreview" rows="5" placeholder="Profile content will appear here..."></textarea>
      </div>
      <div class="preview-footer">
        <button id="archiveContent" class="btn-text-green">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          Archive Manual Changes
        </button>
      </div>
    </section>

    <div class="action-footer hidden" id="actionButtons">
      <div class="button-group">
        <button id="startTyping" class="btn-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Start Typing
        </button>
        <button id="stopTyping" class="btn-danger hidden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><rect x="6" y="6" width="12" height="12"></rect></svg>
          Stop
        </button>
        <button id="nextBlock" class="btn-secondary" disabled title="Alt+A">
          Next Block
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:6px"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
      <button id="emergencyDetach" class="btn-emergency btn-ghost hidden">Emergency Detach</button>
    </div>

    <div class="progress-section hidden" id="progressSection">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="progressText">0%</span>
    </div>

    <div class="status" id="status">Ready</div>
  </div>

  <script src="../lib/personas.js"></script>
  <script src="popup.js"></script>
</body>
</html>
